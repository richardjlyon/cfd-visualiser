name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest tests/ -x -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: npm ci
      # Seed DuckDB from the committed fixture so framework build has data
      - name: Seed DuckDB from fixture
        run: |
          uv run python -c "
          from pathlib import Path
          from pipeline.validate import read_and_validate
          from pipeline.store import upsert
          from pipeline.build_chart_3c import build as bc
          from pipeline.build_meta import build as bm
          Path('data').mkdir(exist_ok=True)
          Path('src/data').mkdir(exist_ok=True)
          df = read_and_validate(Path('tests/fixtures/cfd_sample.csv'))
          upsert(df, 'data/cfd.duckdb')
          bc('data/cfd.duckdb', 'src/data/chart-3c.json')
          bm('data/cfd.duckdb', 'src/content/captions.json', 'src/data/meta.json')
          "
      - run: npx @observablehq/framework build
      - name: EDIT-05 caption lint
        run: uv run python -m pipeline.editorial src/content/captions.json
